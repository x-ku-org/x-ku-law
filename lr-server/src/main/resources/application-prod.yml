# 生产环境：所有敏感配置强制走环境变量，日志 WARN
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&requireSSL=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  rabbitmq: # 接口预留，二期实现
    host: ${MQ_HOST}
    port: ${MQ_PORT}
    virtual-host: ${MQ_VHOST}
    username: ${MQ_USER}
    password: ${MQ_PASSWORD}

  elasticsearch:
    uris: ${ES_URIS}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}

# 生产环境关闭 Swagger（API 文档不对外暴露）
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  search:
    enabled: ${SEARCH_ENABLED:true}
  vector:
    enabled: ${VECTOR_ENABLED:false}   # 嵌入模型接入后置 true

logging:
  level:
    root: WARN
    cn.xku.law: INFO
