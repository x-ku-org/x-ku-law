# 测试环境：连接测试集群，日志 INFO
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  flyway:
    out-of-order: true

logging:
  level:
    root: INFO
    cn.xku.law: INFO
