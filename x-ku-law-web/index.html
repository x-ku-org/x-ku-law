<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>X-KU 法规智询</title>
    <link rel="icon" type="image/x-icon" href="/xku.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=optional" rel="stylesheet" />
    <style>
      :root {
        --paper: #ffffff;
        --paper-2: #fafafa;
        --paper-sunk: #f2f2f4;
        --ink: #0b1530;
        --muted: #71758a;
        --muted-2: #a4a7b6;
        --ink-2: #2a3553;
        --rule: #e7e7eb;
        --rule-strong: #d4d4da;
        --accent: #1e5bff;
        --accent-soft: rgba(30, 91, 255, 0.08);
        --rail-w: 208px;
        --topbar-h: 56px;
        --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
      }

      #app-boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        padding: 48px;
        background: var(--paper);
      }

      #app-boot::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          var(--accent) 45%,
          transparent 90%
        );
        background-size: 200% 100%;
        animation: boot-progress 1.6s var(--ease-soft) infinite;
      }

      .boot-brand {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .boot-logo {
        display: block;
        width: auto;
        height: 40px;
        object-fit: contain;
        flex-shrink: 0;
      }

      .boot-divider {
        width: 1px;
        height: 30px;
        background: var(--rule-strong);
        flex-shrink: 0;
      }

      .boot-brand-text {
        color: var(--ink-2);
        font-family: "Geist", -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.04em;
        line-height: 1;
        white-space: nowrap;
      }

      .boot-status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .boot-ring {
        position: relative;
        display: inline-flex;
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      .boot-ring-svg {
        width: 100%;
        height: 100%;
        animation: boot-ring-spin 0.9s linear infinite;
      }

      .boot-ring-track {
        fill: none;
        stroke: var(--rule);
        stroke-width: 1.5;
      }

      .boot-ring-arc {
        fill: none;
        stroke: var(--accent);
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-dasharray: 30 20;
      }

      .boot-status-text {
        margin: 0;
        color: var(--muted);
        font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
        font-size: 13px;
        letter-spacing: 0.14em;
        text-indent: 0.14em;
        text-transform: uppercase;
      }

      @keyframes boot-ring-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes boot-progress {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      @media (max-width: 640px) {
        .boot-logo { height: 32px; }
        .boot-brand-text { font-size: 16px; }
      }

      @media (prefers-reduced-motion: reduce) {
        #app-boot::before,
        .boot-ring-svg {
          animation: none;
        }

        .boot-ring-arc {
          stroke-dasharray: 30 20;
          opacity: 0.85;
        }

        #app-boot::before {
          background: var(--accent);
          opacity: 0.35;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-boot" role="status" aria-live="polite" aria-label="正在载入 X-KU 法规智询">
        <div class="boot-brand">
          <img class="boot-logo" src="/x-ku-clear.png" alt="X-KU" />
          <span class="boot-divider" aria-hidden="true"></span>
          <span class="boot-brand-text">法规智询</span>
        </div>
        <p class="boot-status">
          <span class="boot-ring" aria-hidden="true">
            <svg class="boot-ring-svg" viewBox="0 0 20 20">
              <circle class="boot-ring-track" cx="10" cy="10" r="8" />
              <circle class="boot-ring-arc" cx="10" cy="10" r="8" />
            </svg>
          </span>
          <span class="boot-status-text">正在载入</span>
        </p>
      </div>
    </div>
    <script>
      (function () {
        var path = location.pathname;
        var label = '正在载入';
        var brand = '法规智询';

        if (path.indexOf('/login') === 0) {
          label = '正在载入登录';
        } else if (path.indexOf('/admin') === 0) {
          label = '正在载入后台';
          brand = '运维后台';
        } else if (path === '/' || path === '/app' || path === '/app/' || path.indexOf('/app/home') === 0) {
          label = '正在载入工作台';
        } else if (path.indexOf('/app/laws/search') === 0) {
          label = '正在载入检索';
        } else if (path.indexOf('/app/laws/') === 0 && path.indexOf('/compare') !== -1) {
          label = '正在载入版本对比';
        } else if (path.indexOf('/app/laws/') === 0) {
          label = '正在载入法规';
        } else if (path.indexOf('/app/ai/chat') === 0) {
          label = '正在载入会话';
        } else if (path.indexOf('/app/') === 0) {
          label = '正在载入页面';
        }

        var boot = document.getElementById('app-boot');
        var status = document.querySelector('.boot-status-text');
        var brandText = document.querySelector('.boot-brand-text');

        if (status) status.textContent = label;
        if (brandText) brandText.textContent = brand;
        if (boot) boot.setAttribute('aria-label', label + ' X-KU 法规智询');
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
